name: Build SpaceXit PC
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v1.1

      - name: Compilar Executavel
        run: |
          cl.exe /EHsc /W3 main.cpp /fe:SpaceXit_PC.exe user32.lib gdi32.lib

      - name: Upload SpaceXit.exe
        uses: actions/upload-artifact@v3
        with:
          name: SpaceXit-PC-Release
          path: SpaceXit_PC.exe
