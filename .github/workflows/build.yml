name: Build SpaceXit PC
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Compilar SpaceXit EXE
        run: |
          cl.exe /EHsc main.cpp /fe:SpaceXit_PC.exe user32.lib gdi32.lib

      - name: Upload do Executavel
        uses: actions/upload-artifact@v4
        with:
          name: SpaceXit-PC-Build
          path: SpaceXit_PC.exe
